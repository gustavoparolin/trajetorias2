name: Comentário humano → ajuste-solicitado

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  detectar-pedido-ajuste:
    runs-on: ubuntu-latest
    # Apenas em issues (não PRs) e não disparado pelo próprio bot
    if: |
      github.event.issue.pull_request == null &&
      github.actor != 'github-actions[bot]'
    steps:
      - name: Verificar palavras-chave de ajuste
        uses: actions/github-script@v7
        with:
          script: |
            const corpo = context.payload.comment.body.toLowerCase();
            const palavrasChave = [
              'ajustar', 'ajuste', 'corrigir', 'correção', 'correcao',
              'revisar', 'revisão', 'revisao', 'alterar', 'alteração',
              'mudar', 'mudança', 'mudanca', 'refazer', 'rever',
              'não aprovado', 'nao aprovado', 'precisa mudar'
            ];

            const temPalavraChave = palavrasChave.some(p => corpo.includes(p));
            if (!temPalavraChave) {
              console.log('Nenhuma palavra-chave detectada. Ignorando.');
              return;
            }

            const labelsStatus = [
              'aguardando-aprovacao',
              'ajuste-solicitado',
              'aprovado',
              'em-implementacao',
              'concluido',
              'falha-ia'
            ];

            // Remover todos os labels de status atuais
            const { data: labelsAtuais } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            for (const label of labelsAtuais) {
              if (labelsStatus.includes(label.name)) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label.name
                });
              }
            }

            // Adicionar ajuste-solicitado
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['ajuste-solicitado']
            });

            console.log(`Issue #${context.issue.number} → ajuste-solicitado (palavra-chave detectada)`);
